document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

hint-placeholder-val=\"{{ true }}\"><span style=\"font-size:12px;color:#3A352D;white-space:nowrap\">{{ r.cond }}<\u002Fspan><\u002Fsc-if>\n                    <\u002Ftd>\n                    <td style=\"padding:12px;vertical-align:top;font-size:12px;color:#3A352D;font-variant-numeric:tabular-nums\">{{ r.year }}<\u002Ftd>\n                    <td style=\"padding:12px;vertical-align:top\">\n                      <div style=\"display:flex;gap:4px;align-items:center\">\n                        <sc-for list=\"{{ r.slots }}\" as=\"s\" hint-placeholder-count=\"4\">\n                          <sc-if value=\"{{ s.on }}\" hint-placeholder-val=\"{{ true }}\"><span title=\"{{ s.label }}\" style=\"width:8px;height:8px;border-radius:50%;background:#6E2433\"><\u002Fspan><\u002Fsc-if>\n                          <sc-if value=\"{{ s.off }}\" hint-placeholder-val=\"{{ false }}\"><span title=\"{{ s.label }}\" style=\"width:8px;height:8px;border-radius:50%;border:1px solid #CFC5B3\"><\u002Fspan><\u002Fsc-if>\n                        <\u002Fsc-for>\n                      <\u002Fdiv>\n                    <\u002Ftd>\n                    <td style=\"padding:12px;vertical-align:top;text-align:right;white-space:nowrap\">\n                      <div style=\"font-weight:600;font-size:13px;color:#1C1A17;font-variant-numeric:tabular-nums\">{{ r.krwLabel }}<\u002Fdiv>\n                      <div style=\"font-size:11px;color:#8A8275;font-variant-numeric:tabular-nums\">{{ r.phpLabel }}<\u002Fdiv>\n                    <\u002Ftd>\n                    <td style=\"padding:12px;vertical-align:top;font-size:12px;color:#3A352D;white-space:nowrap\">{{ r.store }}<\u002Ftd>\n                    <td style=\"padding:12px;vertical-align:top;text-align:right;white-space:nowrap\">\n                      <sc-if value=\"{{ r.showMargins }}\" hint-placeholder-val=\"{{ true }}\">\n                        <sc-if value=\"{{ r.marginPos }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font-size:12px;color:#5C7348;font-variant-numeric:tabular-nums\">{{ r.marginLabel }}<\u002Fspan><\u002Fsc-if>\n                        <sc-if value=\"{{ r.marginNeg }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:12px;color:#A23A2A;font-variant-numeric:tabular-nums\">{{ r.marginLabel }}<\u002Fspan><\u002Fsc-if>\n                      <\u002Fsc-if>\n                    <\u002Ftd>\n                    <td style=\"padding:12px;vertical-align:top\">\n                      <sc-if value=\"{{ r.isNewStatus }}\" hint-placeholder-val=\"{{ true }}\"><div onclick=\"{{ r.onCycle }}\" title=\"Tap to update status\" style=\"cursor:pointer;display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;border:1px solid #6E2433;color:#6E2433;white-space:nowrap\">● New<\u002Fdiv><\u002Fsc-if>\n                      <sc-if value=\"{{ r.isOrdered }}\" hint-placeholder-val=\"{{ false }}\"><div onclick=\"{{ r.onCycle }}\" title=\"Tap to update status\" style=\"cursor:pointer;display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;background:#1C1A17;color:#F4F0E8;white-space:nowrap\">✓ Ordered<\u002Fdiv><\u002Fsc-if>\n                      <sc-if value=\"{{ r.isPassed }}\" hint-placeholder-val=\"{{ false }}\"><div onclick=\"{{ r.onCycle }}\" title=\"Tap to update status\" style=\"cursor:pointer;display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;background:#EFE9DD;color:#9A8F7C;white-space:nowrap\">Passed<\u002Fdiv><\u002Fsc-if>\n                    <\u002Ftd>\n                    <td style=\"padding:12px;vertical-align:top\">\n                      <sc-if value=\"{{ r.real }}\" hint-placeholder-val=\"{{ false }}\"><a href=\"{{ r.link }}\" target=\"_blank\" rel=\"noopener\" style=\"text-decoration:none;color:#41552F;font-size:13px\">↗<\u002Fa><\u002Fsc-if>\n                      <sc-if value=\"{{ r.noSku }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"color:#C9BFAD;font-size:13px\">–<\u002Fspan><\u002Fsc-if>\n                    <\u002Ftd>\n                  <\u002Ftr>\n                \n              <\u002Ftbody>\n            <\u002Ftable>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"margin-top:30px;border-top:1px solid #D9D1C3;padding-top:14px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;font-size:11px;color:#9A8F7C\">\n          <span>Sample data — only ✓ LIVE cards carry a real Gugus No. + working link. Connect a live feed to verify all 9 models.<\u002Fspan>\n          <span>Prices converted at the live FX rate above · margins indicative<\u002Fspan>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1300,&quot;height&quot;:960},&quot;feedUrl&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;feed.json&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;defaultView&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;gallery&quot;,&quot;ledger&quot;],&quot;default&quot;:&quot;gallery&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;showMargins&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;fxRate&quot;:{&quot;editor&quot;:&quot;float&quot;,&quot;default&quot;:0.0398,&quot;min&quot;:0.03,&quot;max&quot;:0.05,&quot;step&quot;:0.0001,&quot;tsType&quot;:&quot;number&quot;}}\">\nclass Component extends DCLogic {\n  state = { view:'gallery', model:'all', fNew:false, fFull:false, fExc:false, rate:0.0398, statuses:{}, listings:null, feedAt:null, feedLive:false };\n\n  componentDidMount(){\n    const patch = {};\n    try {\n      const s = JSON.parse(localStorage.getItem('gugus_status_v1') || '{}');\n      if (s && typeof s === 'object') patch.statuses = s;\n    } catch(e){}\n    let stored = null;\n    try { stored = parseFloat(localStorage.getItem('gugus_rate_v1')); } catch(e){}\n    if (stored && !isNaN(stored)) patch.rate = stored;\n    else if (typeof this.props.fxRate === 'number' && this.props.fxRate > 0) patch.rate = this.props.fxRate;\n    const v = this.props.defaultView;\n    if (v === 'ledger' || v === 'gallery') patch.view = v;\n    if (Object.keys(patch).length) this.setState(patch);\n    this.loadFeed();\n  }\n\n  loadFeed(){\n    const url = this.props.feedUrl || 'feed.json';\n    fetch(url, { cache: 'no-store' })\n      .then(r => { if (!r.ok) throw new Error('no feed'); return r.json(); })\n      .then(feed => {\n        if (!feed || !Array.isArray(feed.listings) || !feed.listings.length) return;\n        const listings = feed.listings.map(it => this.fromFeed(it)).filter(Boolean);\n        if (!listings.length) return;\n        const patch = { listings, feedAt: feed.generatedAt || null, feedLive: true };\n        if (typeof feed.fxRate === 'number' && feed.fxRate > 0) {\n          let stored = null; try { stored = parseFloat(localStorage.getItem('gugus_rate_v1')); } catch(e){}\n          if (!stored || isNaN(stored)) patch.rate = feed.fxRate;\n        }\n        this.setState(patch);\n      })\n      .catch(() => {});\n  }\n\n  fromFeed(it){\n    if (!it || !it.goodsNo) return null;\n    const incl = Array.isArray(it.inclusions) ? it.inclusions : [false,false,false,false];\n    let hours = 999;\n    if (it.postedAt) { const t = Date.parse(it.postedAt); if (!isNaN(t)) hours = (Date.now() - t) / 3600000; }\n    return {\n      id: 'gn' + it.goodsNo, real: true, goodsNo: String(it.goodsNo),\n      brand: it.brand || '—', model: it.model || '—', modelKey: it.modelKey || 'other',\n      krw: Number(it.krw) || 0, cond: it.condition || 'Used', year: it.year || '—',\n      color: it.color || '—', slots: [!!incl[0], !!incl[1], !!incl[2], !!incl[3]],\n      hours, store: it.store || '—',\n      resaleP: (typeof it.resalePHP === 'number') ? it.resalePHP : null,\n      img: it.image || '', stamp: it.stamp || '—', leather: it.leather || '—'\n    };\n  }\n\n  cycle(id){\n    const order = ['new','ordered','passed'];\n    const cur = this.state.statuses[id] || 'new';\n    const next = order[(order.indexOf(cur) + 1) % order.length];\n    const st = Object.assign({}, this.state.statuses, { [id]: next });\n    this.setState({ statuses: st });\n    try { localStorage.setItem('gugus_status_v1', JSON.stringify(st)); } catch(e){}\n  }\n\n  setRate(v){\n    const r = parseFloat(v);\n    this.setState({ rate: (isNaN(r) || r <= 0) ? this.state.rate : r });\n    if (!isNaN(r) && r > 0) { try { localStorage.setItem('gugus_rate_v1', String(r)); } catch(e){} }\n  }\n\n  postedLabel(h){\n    if (h < 1) return Math.round(h * 60) + 'm ago';\n    if (h < 24) return Math.round(h) + 'h ago';\n    if (h < 48) return 'Yesterday';\n    return Math.round(h / 24) + 'd ago';\n  }\n\n  data(){\n    return (Array.isArray(this.state.listings) && this.state.listings.length) ? this.state.listings : this.sampleData();\n  }\n\n  sampleData(){\n    return [\n      { id:'real1', real:true, goodsNo:'10505633', brand:'Chanel', model:'Cambon Chain Shoulder', modelKey:'cambon', krw:1800000, cond:'Excellent', year:'—', color:'Beige · Lambskin · LGHW', slots:[false,false,true,false], hours:50, store:'Apgujeong (압구정점)', resaleP:96000, img:'https://image.gugus.co.kr/gd/2026/06/10505633/10505633_1_20260617140125_534x534.jpg' },\n      { id:'g1',  brand:'Chanel', model:'Classic Flap · Medium', modelKey:'cdf_medium', krw:12300000, cond:'Like New',  year:2023, color:'Black · Caviar · GHW',          slots:[true,true,true,true],   hours:2,    store:'Apgujeong Flagship',  resaleP:560000,  link:'https://www.gugus.co.kr/goods/view?no=104821' },\n      { id:'g2',  brand:'Hermès', model:'Birkin 25',             modelKey:'birkin25',   krw:41800000, cond:'Excellent',  year:2021, color:'Étoupe · Togo · GHW',          slots:[true,true,true,false],  hours:1,    store:'Gangnam Flagship',    resaleP:1860000, link:'https://www.gugus.co.kr/goods/view?no=104822' },\n      { id:'g3',  brand:'Chanel', model:'Wallet on Chain',       modelKey:'woc',        krw:5250000,  cond:'Very Good',  year:2019, color:'Black · Lambskin · LGHW',      slots:[true,true,true,false],  hours:4,    store:'Myeongdong',          resaleP:236000,  link:'https://www.gugus.co.kr/goods/view?no=104823' },\n      { id:'g4',  brand:'Hermès', model:'Mini Kelly II',         modelKey:'mini_kelly', krw:52000000, cond:'Like New',   year:2023, color:'Rose Confetti · Epsom · GHW',  slots:[true,true,true,true],   hours:0.5,  store:'Apgujeong Flagship',  resaleP:2360000, rare:true, link:'https://www.gugus.co.kr/goods/view?no=104824' },\n      { id:'g5',  brand:'Chanel', model:'Classic Flap · Jumbo',  modelKey:'cdf_jumbo',  krw:11900000, cond:'Excellent',  year:2020, color:'Black · Caviar · SHW',         slots:[true,false,true,false], hours:7,    store:'Busan Seomyeon',      resaleP:545000,  link:'https://www.gugus.co.kr/goods/view?no=104825' },\n      { id:'g6',  brand:'Chanel', model:'Boy · Medium',          modelKey:'boy_med',    krw:7400000,  cond:'Good',       year:2018, color:'Black · Calfskin · RHW',       slots:[false,true,true,false], hours:9,    store:'Online Consignment',  resaleP:285000,  link:'https://www.gugus.co.kr/goods/view?no=104826' },\n      { id:'g7',  brand:'Hermès', model:'Birkin 30',             modelKey:'birkin30',   krw:36500000, cond:'Very Good',  year:2019, color:'Gold · Togo · GHW',            slots:[true,false,true,false], hours:22,   store:'Gangnam Flagship',    resaleP:1640000, link:'https://www.gugus.co.kr/goods/view?no=104827' },\n      { id:'g8',  brand:'Chanel', model:'Classic Flap · Small',  modelKey:'cdf_small',  krw:10800000, cond:'New',        year:2024, color:'Black · Caviar · GHW',         slots:[true,true,true,true],   hours:5,    store:'Apgujeong Flagship',  resaleP:520000,  link:'https://www.gugus.co.kr/goods/view?no=104828' },\n      { id:'g9',  brand:'Hermès', model:'Kelly 25',              modelKey:'kelly25',    krw:47200000, cond:'Excellent',  year:2022, color:'Black · Sellier Epsom · GHW',  slots:[true,true,true,true],   hours:3,    store:'Myeongdong',          resaleP:2150000, link:'https://www.gugus.co.kr/goods/view?no=104829' },\n      { id:'g10', brand:'Chanel', model:'Classic Flap · Medium', modelKey:'cdf_medium', krw:13500000, cond:'New',        year:2024, color:'Beige Clair · Caviar · LGHW',  slots:[true,true,true,true],   hours:26,   store:'Daegu',               resaleP:600000,  rare:true, link:'https://www.gugus.co.kr/goods/view?no=104830' },\n      { id:'g11', brand:'Chanel', model:'Wallet on Chain',       modelKey:'woc',        krw:4950000,  cond:'Excellent',  year:2021, color:'Black · Caviar · GHW',         slots:[true,true,true,false],  hours:1.5,  store:'Online Consignment',  resaleP:240000,  link:'https://www.gugus.co.kr/goods/view?no=104831' },\n      { id:'g12', brand:'Hermès', model:'Birkin 25',             modelKey:'birkin25',   krw:44000000, cond:'Like New',   year:2023, color:'Nata · Swift · GHW',           slots:[true,true,true,true],   hours:12,   store:'Gangnam Flagship',    resaleP:1990000, rare:true, link:'https://www.gugus.co.kr/goods/view?no=104832' },\n      { id:'g13', brand:'Hermès', model:'Mini Kelly II',         modelKey:'mini_kelly', krw:49500000, cond:'Excellent',  year:2021, color:'Black · Chèvre · GHW',         slots:[true,true,true,false],  hours:40,   store:'Busan Seomyeon',      resaleP:2240000, link:'https://www.gugus.co.kr/goods/view?no=104833' }\n    ];\n  }\n\n  renderVals(){\n    const st = this.state;\n    const rate = st.rate;\n    const statuses = st.statuses || {};\n    const showMargins = this.props.showMargins !== false;\n    const fmtK = n => '₩' + n.toLocaleString('en-US');\n    const fmtP = n => '₱' + Math.round(n).toLocaleString('en-US');\n    const slotLabels = b => b === 'Chanel' ? ['Box','Card','Dustbag','Receipt'] : ['Box','Dustbag','Clochette','Receipt'];\n    const topConds = ['New','Like New','Excellent'];\n\n    const data = this.data();\n\n    const mk = (d) => {\n      const isNew = d.hours < 6;\n      const full = d.slots.every(Boolean);\n      const costP = d.krw * rate;\n      const hasMargin = typeof d.resaleP === 'number' && d.resaleP > 0;\n      const margin = hasMargin ? (d.resaleP - costP) : 0;\n      const pct = (hasMargin && costP) ? Math.round(margin / costP * 100) : 0;\n      const labels = slotLabels(d.brand);\n      const slots = labels.map((l, i) => ({ label: l, on: !!d.slots[i], off: !d.slots[i] }));\n      const condTop = topConds.indexOf(d.cond) !== -1;\n      const status = statuses[d.id] || 'new';\n      const real = !!d.real;\n      const sku = real ? d.goodsNo : null;\n      const link = real ? ('https://www.gugus.co.kr/goods/viewGoods?goodsNo=' + encodeURIComponent(sku)) : '';\n      const sign = margin >= 0 ? '+' : '−';\n      const psign = pct >= 0 ? '+' : '−';\n      return {\n        id:d.id, brand:d.brand, model:d.model, modelKey:d.modelKey, color:d.color,\n        cond:d.cond, condTop, condNorm:!condTop, year:String(d.year), leather:d.leather||'—', stamp:d.stamp||'—',\n        krwLabel:fmtK(d.krw), phpLabel:fmtP(costP),\n        postedLabel:this.postedLabel(d.hours), hours:d.hours, isNew,\n        store:d.store, glyph:d.brand === 'Chanel' ? 'CC' : 'H',\n        full, rare:!!d.rare, link, slots, sku,\n        real, hasSku: real, noSku: !real,\n        img: d.img || '', hasImg: !!d.img, noImg: !d.img,\n        onCopy: () => { if (real && sku) { try { navigator.clipboard.writeText(sku); } catch(e){} } },\n        marginLabel: sign + fmtP(Math.abs(margin)) + ' · ' + psign + Math.abs(pct) + '%',\n        marginPos: hasMargin && margin >= 0, marginNeg: hasMargin && margin < 0, showMargins,\n        status, isNewStatus: status === 'new', isOrdered: status === 'ordered', isPassed: status === 'passed',\n        opacity: status === 'passed' ? 0.5 : 1,\n        onCycle: () => this.cycle(d.id)\n      };\n    };\n\n    const all = data.map(mk);\n\n    let rows = all.filter(x => {\n      if (st.model !== 'all' && x.modelKey !== st.model) return false;\n      if (st.fNew && !x.isNew) return false;\n      if (st.fFull && !x.full) return false;\n      if (st.fExc && !x.condTop) return false;\n      return true;\n    });\n    rows.sort((a, b) => a.hours - b.hours);\n\n    const defs = [\n      ['all','All listings'],\n      ['cdf_small','Classic Flap · Small'],\n      ['cdf_medium','Classic Flap · Medium'],\n      ['cdf_jumbo','Classic Flap · Jumbo'],\n      ['woc','Wallet on Chain'],\n      ['boy_med','Boy · Medium'],\n      ['birkin25','Birkin 25'],\n      ['birkin30','Birkin 30'],\n      ['kelly25','Kelly 25'],\n      ['mini_kelly','Mini Kelly']\n    ];\n    const counts = {};\n    data.forEach(d => { counts[d.modelKey] = (counts[d.modelKey] || 0) + 1; });\n    const models = defs.map(([k, l]) => ({\n      key:k, label:l,\n      count: k === 'all' ? data.length : (counts[k] || 0),\n      active: st.model === k,\n      onSelect: () => this.setState({ model: k })\n    }));\n\n    const headTitle = st.model === 'all' ? 'All new arrivals' : (defs.find(x => x[0] === st.model) || [null,''])[1];\n\n    const now = new Date();\n    let hh = now.getHours();\n    const mm = String(now.getMinutes()).padStart(2, '0');\n    const ap = hh < 12 ? 'AM' : 'PM';\n    hh = hh % 12 || 12;\n\n    return {\n      rows, models, headTitle,\n      noResults: rows.length === 0,\n      stats: {\n        newToday: all.filter(x => x.isNew).length,\n        fullSets: all.filter(x => x.full).length,\n        topCond: all.filter(x => x.condTop).length,\n        matches: rows.length,\n        total: all.length\n      },\n      isGallery: st.view === 'gallery', isGalleryOff: st.view !== 'gallery',\n      isLedger: st.view === 'ledger', isLedgerOff: st.view !== 'ledger',\n      setGallery: () => this.setState({ view:'gallery' }),\n      setLedger: () => this.setState({ view:'ledger' }),\n      fNew: st.fNew, fNewOff: !st.fNew,\n      fFull: st.fFull, fFullOff: !st.fFull,\n      fExc: st.fExc, fExcOff: !st.fExc,\n      toggleNew: () => this.setState({ fNew: !st.fNew }),\n      toggleFull: () => this.setState({ fFull: !st.fFull }),\n      toggleExc: () => this.setState({ fExc: !st.fExc }),\n      rateValue: rate,\n      onRate: (e) => this.setRate(e.target.value),\n      rateInv: '₱1 = ₩' + (1 / rate).toFixed(1),\n      feedLive: !!st.feedLive, feedSample: !st.feedLive,\n      nowLabel: hh + ':' + mm + ' ' + ap\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
