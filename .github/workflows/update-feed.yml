name: Update Gugus feed

on:
  schedule:
    # Every 15 minutes (UTC). GitHub runs scheduled jobs on a best-effort
    # basis and may delay them under load, so treat this as "about every 15 min".
    - cron: "7,22,37,52 * * * *"   # off-peak minutes; external trigger handles 15-min
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

# Allow the job to push the regenerated feed.json back to the repo.
permissions:
  contents: write

# Never let two runs overlap.
concurrency:
  group: update-feed
  cancel-in-progress: false

jobs:
  build-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install beautifulsoup4

      - name: Scrape gugus and build feed.json
        run: python scripts/scrape_gugus.py

      - name: Commit feed.json if it changed
        run: |
          git config user.name  "gugus-feed-bot"
          git config user.email "actions@users.noreply.github.com"
          if git status --porcelain feed.json detail_cache.json | grep -q .; then
            git add feed.json detail_cache.json
            git commit -m "chore: update feed.json [skip ci]"
            git push
            echo "feed.json updated and pushed."
          else
            echo "No change in feed.json; nothing to commit."
          fi
